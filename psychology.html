<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psychology — Mock Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0A0408;
    --bg-card: #1F0A14;
    --bg-card-hi: #2D0F1F;
    --crimson: #DC2626;
    --crimson-soft: #F87171;
    --pink: #EC4899;
    --pink-soft: #F472B6;
    --pink-glow: rgba(236, 72, 153, 0.32);
    --crimson-glow: rgba(220, 38, 38, 0.28);
    --gold: #F59E0B;
    --gold-soft: #FCD34D;
    --gold-glow: rgba(245, 158, 11, 0.35);
    --text: #F5E5EC;
    --text-dim: #A07B89;
    --border: rgba(236, 72, 153, 0.22);
    --border-gold: rgba(245, 158, 11, 0.32);
    --correct: #34D399;
    --correct-glow: rgba(52, 211, 153, 0.25);
    --wrong: #F43F5E;
    --wrong-glow: rgba(244, 63, 94, 0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(236, 72, 153, 0.10), transparent 55%),
      radial-gradient(circle at 80% 80%, rgba(220, 38, 38, 0.08), transparent 55%);
    pointer-events: none;
    z-index: -1;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px 16px;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--pink-soft);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { background: var(--bg-card); border-color: var(--pink); }

  .subject-tag {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--pink);
    letter-spacing: 0.2em;
    font-size: 0.85rem;
    text-shadow: 0 0 12px var(--pink-glow);
  }

  /* SCREENS */
  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }

  /* HOME */
  .home-hero {
    text-align: center;
    padding: 24px 8px 28px;
  }

  .home-hero h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.2rem, 7vw, 3rem);
    font-weight: 900;
    color: var(--pink);
    text-shadow: 0 0 24px var(--pink-glow), 0 0 4px rgba(255,255,255,0.3);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .home-hero .tagline {
    color: var(--text-dim);
    font-size: 1rem;
    font-weight: 500;
    font-style: italic;
  }

  .rounds-grid {
    display: grid;
    gap: 14px;
    padding: 8px 0 32px;
  }

  .round-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-hi) 100%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .round-card:hover {
    transform: translateY(-2px);
    border-color: var(--pink);
    box-shadow: 0 8px 24px var(--pink-glow);
  }
  .round-card.final {
    border-color: var(--border-gold);
    background: linear-gradient(135deg, #2A0F0A 0%, #1F0A14 100%);
  }
  .round-card.final:hover {
    border-color: var(--gold);
    box-shadow: 0 8px 24px var(--gold-glow);
  }

  .round-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .round-icon { font-size: 1.6rem; }

  .round-best {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold-soft);
    letter-spacing: 0.08em;
    font-weight: 700;
  }
  .round-best.empty { color: var(--text-dim); opacity: 0.55; }

  .round-card h3 {
    font-family: 'Cinzel', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--pink-soft);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .round-card.final h3 { color: var(--gold-soft); }

  .round-card .desc {
    font-size: 0.88rem;
    color: var(--text-dim);
  }

  /* QUIZ */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .quiz-round-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--pink-soft);
    letter-spacing: 0.06em;
    font-size: 0.9rem;
  }

  .quiz-progress {
    color: var(--text-dim);
    font-weight: 600;
    font-size: 0.9rem;
  }

  .progress-bar {
    height: 6px;
    background: var(--bg-card);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 18px;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--crimson) 0%, var(--pink) 100%);
    transition: width 0.4s;
    box-shadow: 0 0 10px var(--pink-glow);
  }

  .question-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-hi) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
  }

  .question-text {
    font-size: 1.08rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 18px;
    line-height: 1.45;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    background: var(--bg-deep);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 13px 16px;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 0.98rem;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .option:hover:not(:disabled) {
    border-color: var(--pink);
    background: var(--bg-card-hi);
  }
  .option:disabled { cursor: default; opacity: 0.85; }

  .option-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    background: var(--bg-card-hi);
    border-radius: 6px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--gold-soft);
    flex-shrink: 0;
    font-size: 0.85rem;
  }

  .option.correct {
    border-color: var(--correct);
    background: rgba(52, 211, 153, 0.13);
    box-shadow: 0 0 14px var(--correct-glow);
  }
  .option.correct .option-letter { background: var(--correct); color: var(--bg-deep); }

  .option.wrong {
    border-color: var(--wrong);
    background: rgba(244, 63, 94, 0.12);
    box-shadow: 0 0 14px var(--wrong-glow);
  }
  .option.wrong .option-letter { background: var(--wrong); color: white; }

  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 10px;
    border-left: 3px solid var(--correct);
    background: rgba(52, 211, 153, 0.08);
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.wrong { border-left-color: var(--wrong); background: rgba(244, 63, 94, 0.07); }

  .feedback-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--correct);
    letter-spacing: 0.05em;
    font-size: 0.92rem;
  }
  .feedback.wrong .feedback-title { color: var(--wrong); }

  .feedback-text {
    color: var(--text);
    font-size: 0.95rem;
    line-height: 1.5;
  }

  .next-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--crimson) 0%, var(--pink) 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.05rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    box-shadow: 0 4px 14px var(--pink-glow);
    display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--pink-glow); }

  /* RESULTS */
  .results-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-hi) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 22px;
    text-align: center;
    margin-top: 12px;
  }

  .results-title {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold-soft);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    text-shadow: 0 0 12px var(--gold-glow);
  }
  .results-round {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 22px;
  }

  .score-circle {
    width: 130px;
    height: 130px;
    margin: 0 auto 20px;
    border: 3px solid var(--pink);
    border-radius: 50%;
    background: var(--bg-deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 32px var(--pink-glow), inset 0 0 22px rgba(236, 72, 153, 0.08);
  }
  .score-num {
    font-family: 'Cinzel', serif;
    font-size: 3rem;
    color: var(--pink-soft);
    font-weight: 900;
    line-height: 1;
  }
  .score-total {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-top: 4px;
  }

  .new-best {
    color: var(--gold-soft);
    font-family: 'Cinzel', serif;
    font-weight: 700;
    margin-bottom: 14px;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-shadow: 0 0 14px var(--gold-glow);
  }

  .score-message {
    font-size: 1.05rem;
    margin-bottom: 6px;
    font-weight: 600;
    color: var(--pink-soft);
  }
  .score-sub {
    color: var(--text-dim);
    font-size: 0.92rem;
    margin-bottom: 24px;
  }

  .results-actions {
    display: flex;
    gap: 10px;
    flex-direction: column;
  }

  .btn {
    padding: 13px 18px;
    border-radius: 10px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    letter-spacing: 0.05em;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--crimson) 0%, var(--pink) 100%);
    color: white;
    box-shadow: 0 4px 14px var(--pink-glow);
  }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-secondary {
    background: transparent;
    color: var(--gold-soft);
    border: 1.5px solid var(--border-gold);
  }
  .btn-secondary:hover { background: var(--bg-card-hi); border-color: var(--gold); }

  @media (max-width: 480px) {
    .home-hero h1 { font-size: 2rem; }
    .question-card { padding: 18px; }
    .question-text { font-size: 1rem; }
    .option { font-size: 0.94rem; padding: 12px 14px; }
    .score-circle { width: 110px; height: 110px; }
    .score-num { font-size: 2.5rem; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <a href="index.html" class="back-btn">← Mock Mode</a>
    <span class="subject-tag">PSYCHOLOGY</span>
  </div>

  <!-- HOME -->
  <div class="screen active" id="home-screen">
    <div class="home-hero">
      <h1>PSYCHOLOGY</h1>
      <p class="tagline">Five rituals. One pentagram.</p>
    </div>
    <div class="rounds-grid" id="rounds-grid"></div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="quiz-screen">
    <div class="quiz-header">
      <span class="quiz-round-name" id="quiz-round-name"></span>
      <span class="quiz-progress" id="quiz-progress"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="question-card">
      <div class="question-text" id="question-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <div class="feedback-title" id="feedback-title"></div>
        <div class="feedback-text" id="feedback-text"></div>
      </div>
    </div>
    <button class="next-btn" id="next-btn">NEXT →</button>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="results-screen">
    <div class="results-card">
      <div class="results-title" id="results-title">RITUAL COMPLETE</div>
      <div class="results-round" id="results-round-name"></div>
      <div class="score-circle">
        <div class="score-num" id="score-num">0</div>
        <div class="score-total" id="score-total">/ 0</div>
      </div>
      <div class="new-best" id="new-best" style="display:none;">⚡ NEW BEST ⚡</div>
      <div class="score-message" id="score-message"></div>
      <div class="score-sub" id="score-sub"></div>
      <div class="results-actions">
        <button class="btn btn-primary" id="play-again-btn">PLAY AGAIN</button>
        <button class="btn btn-secondary" id="back-home-btn">CHOOSE ANOTHER ROUND</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ============================================================
   PSYCHOLOGY QUESTION BANK
   Edexcel International GCSE — Year 10 Paper 1
   5 themed rounds + The Pentagram (Final Boss)
   ============================================================ */

const QUESTION_BANK = {

  /* =========================================================
     ROUND 1: ORIGIN STORY 🥚
     Development — Piaget, Kohlberg, Dweck, Gunderson
     ========================================================= */
  origin: [
    { q: "What was the FIRST stage in Piaget's theory of cognitive development?",
      options: ["Pre-operational", "Sensorimotor", "Concrete operational", "Formal operational"],
      correct: 1,
      explain: "Sensorimotor = stage 1, birth to ~2 years. Babies learn through senses and physical actions. They drop things to see what happens. Tiny scientists with no theory." },
    { q: "A child watches a parent hide a toy under a blanket and immediately looks under the blanket. This shows they have developed...",
      options: ["Conservation", "Object permanence", "Egocentrism", "Formal operational thinking"],
      correct: 1,
      explain: "Object permanence in action — the toy still exists in their mind even when out of sight. Develops around 8 months. Before that, peekaboo is genuinely magic. After, it's just stalling." },
    { q: "Which Piaget stage covers approximately ages 2-7?",
      options: ["Sensorimotor", "Pre-operational", "Concrete operational", "Formal operational"],
      correct: 1,
      explain: "Pre-operational = ages 2-7. Language explodes, symbolic play kicks in, but logic is wonky. Egocentric, can't conserve, struggles with reversibility." },
    { q: "EGOCENTRISM in Piaget's theory means a child...",
      options: ["Is selfish and rude", "Can't see things from another person's perspective", "Always wants to be in charge", "Refuses to share toys"],
      correct: 1,
      explain: "Egocentrism ≠ selfish. It means literally not yet able to take another viewpoint. They think you see what they see. Hide their face, no one can see them. Adorable, briefly." },
    { q: "Gastón shows a child two circles with the same number of marbles, but spaces out one circle. The child says the spaced-out circle has MORE marbles. This shows the child has not yet developed...",
      options: ["Conservation", "Object permanence", "Egocentrism", "Schemas"],
      correct: 0,
      explain: "Conservation = understanding amount stays the same despite changes in appearance. Pre-operational kids fail this. Spread-out marbles LOOK like more, so they ARE more (in their brain)." },
    { q: "Which Piaget stage covers approximately ages 7-11?",
      options: ["Pre-operational", "Concrete operational", "Formal operational", "Sensorimotor"],
      correct: 1,
      explain: "Concrete operational = ages 7-11. Logic kicks in — but only for concrete (real, physical) things. Conservation? Sorted. Reversibility? Sorted. Abstract hypotheticals? Still loading." },
    { q: "At which stage do children develop the ability to think ABSTRACTLY and use HYPOTHETICAL reasoning?",
      options: ["Sensorimotor", "Pre-operational", "Concrete operational", "Formal operational"],
      correct: 3,
      explain: "Formal operational (~11+). 'What if humans had three legs?' becomes thinkable. Logic detaches from physical reality. Maths, philosophy, planning a future — all unlocked." },
    { q: "Someone in the FORMAL OPERATIONAL stage is asked to imagine a 14-year-old's life in 20 years. They would be able to...",
      options: ["Only describe what they see right now", "Use hypothetical reasoning to imagine multiple possible futures", "Refuse to answer because they can't see it", "Only think about themselves"],
      correct: 1,
      explain: "Formal operational = abstract + hypothetical thinking online. They can build mental models of futures, weigh possibilities, imagine multiple outcomes. The 'what if' brain has booted up." },
    { q: "A SCHEMA in Piaget's theory is...",
      options: ["A type of dance", "A mental framework or 'file' for understanding the world", "A research method", "A school timetable"],
      correct: 1,
      explain: "Schema = mental file. 'Dog' schema includes four legs, fur, barks, wags tail. New info gets sorted into existing schemas (assimilation) or schemas adjust (accommodation)." },
    { q: "ACCOMMODATION (in Piaget) means...",
      options: ["Booking a hotel", "Changing or creating a schema to fit new information", "Memorising new vocabulary", "Helping someone else learn"],
      correct: 1,
      explain: "Accommodation = 'wait, that doesn't fit — I need to update my mental model.' Kid learns a horse ≠ a dog. New 'horse' schema gets created. Brain rewires to match reality." },
    { q: "Kohlberg's FIRST level of morality is called...",
      options: ["Pre-conventional", "Conventional", "Post-conventional", "Anti-conventional"],
      correct: 0,
      explain: "Pre-conventional = morality based on consequences for YOU. 'Don't steal because you'll get caught.' Self-interest is the whole game. Mostly young children." },
    { q: "PRE-CONVENTIONAL morality is based on...",
      options: ["Avoiding punishment and gaining rewards for yourself", "Following society's rules and laws", "Personal ethical principles", "Religious texts only"],
      correct: 0,
      explain: "Pre-conventional = 'what's in it for me / what gets me in trouble?' Self-focused. Mostly young kids. Some adults stay here. Tragic but real." },
    { q: "CONVENTIONAL morality is based on...",
      options: ["Personal interest only", "Following social rules and being seen as 'good'", "Universal ethical principles above all laws", "Whatever feels good in the moment"],
      correct: 1,
      explain: "Conventional = 'follow the rules because they ARE the rules.' Approval-seeking, law-abiding. Most teens and adults sit here. Society's reliable backbone." },
    { q: "POST-CONVENTIONAL morality is based on...",
      options: ["Avoiding punishment", "Following all laws without question", "Personal ethical principles, even if they conflict with laws", "Doing what your friends do"],
      correct: 2,
      explain: "Post-conventional = 'I follow my own ethical compass, even when laws are wrong.' Civil disobedience, conscientious objectors, whistleblowers. Rare and disruptive." },
    { q: "Dweck's 'FIXED MINDSET' is the belief that...",
      options: ["Intelligence and ability are unchangeable — you're either smart or you're not", "Hard work and practice can grow your abilities", "You should never try new things", "Mistakes are good for learning"],
      correct: 0,
      explain: "Fixed mindset = 'talent is innate. If I'm bad at maths, I'll always be bad at maths.' Avoids challenges (because failure = proof of weakness). Caps potential at the start line." },
    { q: "Dweck's 'GROWTH MINDSET' is the belief that...",
      options: ["Some people are just born smart and others aren't", "Abilities can be developed through effort and practice", "Failure means you should give up", "Praise should focus on natural talent"],
      correct: 1,
      explain: "Growth mindset = 'I can get better at this with effort.' Embraces challenge. Sees failure as data, not verdict. Strong correlation with actually getting better at things." },
    { q: "Gunderson et al. (2013) studied...",
      options: ["Memory in elderly patients", "How parents' praise of toddlers affects children's later mindset", "The effects of caffeine on revision", "Children's reactions to spider phobias"],
      correct: 1,
      explain: "Gunderson 2013 = praise study. Recorded how parents praised toddlers (14-38 months), then checked the kids' mindsets at age 7-8. Process praise → growth mindset. Person praise → fixed." },
    { q: "In Gunderson (2013), 'PROCESS PRAISE' refers to praising...",
      options: ["The child's natural intelligence ('you're so smart')", "The child's effort or strategy ('you worked hard on that')", "The child's appearance", "The end result only"],
      correct: 1,
      explain: "Process praise = effort and strategy. Linked to growth mindset later. Person praise ('you're smart') sounds nice but creates a fixed mindset — kids feel pressure to keep BEING smart instead of getting better." }
  ],

  /* =========================================================
     ROUND 2: THE MIND PALACE 🧠
     Memory — MSM, Bartlett, Peterson, amnesia
     ========================================================= */
  palace: [
    { q: "What are the THREE main stores in the Multi-Store Model of Memory?",
      options: ["Past, present, future", "Sensory register, short-term memory, long-term memory", "Fast, medium, slow", "Visual, audio, written"],
      correct: 1,
      explain: "Multi-store model: Sensory Register → STM → LTM. Information flows through these stages, with attention and rehearsal as the gatekeepers between them." },
    { q: "The SENSORY REGISTER stores information from your senses for...",
      options: ["Roughly your whole life", "About 15-30 seconds", "A fraction of a second to a few seconds", "Exactly 7 minutes"],
      correct: 2,
      explain: "Sensory register = ultra-short. The brain's first impression buffer. Most of it gets discarded instantly. Only what you ATTEND to gets passed to STM." },
    { q: "The capacity of SHORT-TERM MEMORY is roughly...",
      options: ["7 ± 2 items", "100 items", "Unlimited", "Just 1 item"],
      correct: 0,
      explain: "Miller's Magic Number: 7 plus or minus 2 (so 5-9 items). Why phone numbers used to be 7 digits. Beyond that, your brain starts dropping items unless you chunk them." },
    { q: "The DURATION of short-term memory (without rehearsal) is roughly...",
      options: ["A lifetime", "About 18-30 seconds", "Several hours", "Exactly 5 minutes"],
      correct: 1,
      explain: "STM duration = ~18-30 seconds without rehearsal. Peterson & Peterson nailed this down with trigrams. Without active repetition, info decays fast." },
    { q: "The DURATION of long-term memory can be...",
      options: ["Just 5 minutes", "About 30 seconds", "From a few minutes to a lifetime", "Always exactly 24 hours"],
      correct: 2,
      explain: "LTM duration = potentially forever. Doesn't mean it's accurate though — looking at you, Bartlett. Your favourite childhood memory is probably 60% fan-fiction by now." },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  const scores = getBestScores();
  scores[roundKey] = score;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(scores)); } catch {}
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

/* ============================================================
   HOME SCREEN
   ============================================================ */
function renderHome() {
  const grid = document.getElementById('rounds-grid');
  const bests = getBestScores();
  grid.innerHTML = '';

  ROUNDS.forEach(round => {
    const best = bests[round.key];
    const bestText = best !== undefined
      ? `BEST ${best}/${round.qCount}`
      : `${round.qCount} QUESTIONS`;
    const bestClass = best !== undefined ? 'round-best' : 'round-best empty';

    const card = document.createElement('div');
    card.className = 'round-card' + (round.isFinal ? ' final' : '');
    card.innerHTML = `
      <div class="round-card-top">
        <div class="round-icon">${round.icon}</div>
        <div class="${bestClass}">${bestText}</div>
      </div>
      <h3>${round.title}</h3>
      <div class="desc">${round.tagline}</div>
    `;
    card.addEventListener('click', () => startRound(round));
    grid.appendChild(card);
  });
}

/* ============================================================
   START ROUND
   ============================================================ */
function startRound(round) {
  state.currentRound = round;
  state.qIndex = 0;
  state.score = 0;
  state.answered = false;

  let pool;
  if (round.isFinal) {
    pool = Object.values(QUESTION_BANK).flat();
  } else {
    pool = QUESTION_BANK[round.key];
  }

  state.questions = shuffle(pool).slice(0, round.qCount);

  showScreen('quiz-screen');
  renderQuestion();
}

/* ============================================================
   RENDER QUESTION
   ============================================================ */
function renderQuestion() {
  state.answered = false;

  const q = state.questions[state.qIndex];
  document.getElementById('quiz-round-name').textContent = `${state.currentRound.icon} ${state.currentRound.title}`;
  document.getElementById('quiz-progress').textContent = `${state.qIndex + 1} / ${state.questions.length}`;
  document.getElementById('progress-fill').style.width = `${(state.qIndex / state.questions.length) * 100}%`;
  document.getElementById('question-text').textContent = q.q;

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => handleAnswer(i));
    optionsEl.appendChild(btn);
  });

  const feedback = document.getElementById('feedback');
  feedback.className = 'feedback';
  feedback.classList.remove('show', 'wrong');

  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.remove('show');
}

/* ============================================================
   HANDLE ANSWER
   ============================================================ */
function handleAnswer(choice) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.qIndex];
  const correct = choice === q.correct;
  const allButtons = document.querySelectorAll('.option');

  allButtons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.correct) b.classList.add('correct');
    else if (i === choice) b.classList.add('wrong');
  });

  const feedback = document.getElementById('feedback');
  const feedbackTitle = document.getElementById('feedback-title');
  const feedbackText = document.getElementById('feedback-text');

  if (correct) {
    state.score++;
    feedbackTitle.textContent = '✓ NAILED IT';
    feedback.classList.add('show');
  } else {
    feedbackTitle.textContent = '✗ NOT QUITE';
    feedback.classList.add('show', 'wrong');
  }
  feedbackText.textContent = q.explain;

  document.getElementById('progress-fill').style.width = `${((state.qIndex + 1) / state.questions.length) * 100}%`;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = state.qIndex === state.questions.length - 1 ? 'SEE RESULTS →' : 'NEXT →';
  nextBtn.classList.add('show');
}

document.getElementById('next-btn').addEventListener('click', () => {
  state.qIndex++;
  if (state.qIndex >= state.questions.length) showResults();
  else renderQuestion();
});

/* ============================================================
   RESULTS
   ============================================================ */
function showResults() {
  showScreen('results-screen');
  const total = state.questions.length;
  const score = state.score;
  const pct = (score / total) * 100;

  document.getElementById('results-round-name').textContent = `${state.currentRound.icon} ${state.currentRound.title}`;
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-total').textContent = `/ ${total}`;

  let msg, sub;
  if (pct === 100)      { msg = '🔥 FLAWLESS RITUAL 🔥';    sub = 'Perfect score. The pentagram glows brighter.'; }
  else if (pct >= 80)   { msg = '💀 STONE COLD';             sub = 'That was clean. Run it back to lock it in.'; }
  else if (pct >= 60)   { msg = '🩸 DRAWING BLOOD';          sub = 'Strong run. The slips are exactly where to focus.'; }
  else if (pct >= 40)   { msg = '🕯️ FINDING THE THREAD';     sub = 'Coming together. Every miss = a study tip.'; }
  else                   { msg = '👁️ EARLY DAYS';             sub = 'No stress. The grind respects effort. Go again.'; }

  document.getElementById('score-message').textContent = msg;
  document.getElementById('score-sub').textContent = sub;

  const bests = getBestScores();
  const previousBest = bests[state.currentRound.key];
  const newBestEl = document.getElementById('new-best');
  if (previousBest === undefined || score > previousBest) {
    setBestScore(state.currentRound.key, score);
    newBestEl.style.display = 'block';
  } else {
    newBestEl.style.display = 'none';
  }
}

document.getElementById('play-again-btn').addEventListener('click', () => startRound(state.currentRound));
document.getElementById('back-home-btn').addEventListener('click', () => {
  renderHome();
  showScreen('home-screen');
});

/* ============================================================
   INIT
   ============================================================ */
renderHome();
</script>
</body>
</html>
