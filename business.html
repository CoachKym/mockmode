<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Studies — Mock Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0A1612;
    --bg-card: #0F2820;
    --bg-card-hi: #163C30;
    --emerald: #10B981;
    --emerald-soft: #34D399;
    --emerald-glow: rgba(16, 185, 129, 0.28);
    --gold: #FCD34D;
    --gold-soft: #FDE68A;
    --gold-rich: #D4AF37;
    --gold-glow: rgba(252, 211, 77, 0.35);
    --text: #E8F5F0;
    --text-dim: #94B8AC;
    --border: rgba(16, 185, 129, 0.22);
    --border-gold: rgba(212, 175, 55, 0.35);
    --correct: #10B981;
    --wrong: #EF4444;
    --wrong-glow: rgba(239, 68, 68, 0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 25% 15%, rgba(16, 185, 129, 0.08), transparent 55%),
      radial-gradient(circle at 75% 85%, rgba(212, 175, 55, 0.06), transparent 55%);
    pointer-events: none;
    z-index: -1;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px 16px;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--emerald-soft);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { background: var(--bg-card); border-color: var(--emerald); }

  .subject-tag {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.18em;
    font-size: 0.85rem;
    text-shadow: 0 0 12px var(--gold-glow);
  }

  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }

  .home-hero {
    text-align: center;
    padding: 24px 8px 28px;
  }

  .home-hero h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.2rem, 7vw, 3rem);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 24px var(--gold-glow), 0 0 4px rgba(255,255,255,0.4);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .home-hero .tagline {
    color: var(--text-dim);
    font-size: 1rem;
    font-weight: 500;
    font-style: italic;
  }

  .rounds-grid {
    display: grid;
    gap: 14px;
    padding: 8px 0 32px;
  }

  .round-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-hi) 100%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .round-card:hover {
    transform: translateY(-2px);
    border-color: var(--emerald);
    box-shadow: 0 8px 24px rgba(16, 185, 129, 0.15);
  }
  .round-card.final {
    border-color: var(--border-gold);
    background: linear-gradient(135deg, #1A2A1F 0%, #2A2418 100%);
  }
  .round-card.final:hover {
    border-color: var(--gold);
    box-shadow: 0 8px 24px var(--gold-glow);
  }

  .round-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .round-icon { font-size: 1.6rem; }

  .round-best {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 0.08em;
    font-weight: 700;
  }
  .round-best.empty { color: var(--text-dim); opacity: 0.55; }

  .round-card h3 {
    font-family: 'Cinzel', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--emerald-soft);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .round-card.final h3 { color: var(--gold); }

  .round-card .desc {
    font-size: 0.88rem;
    color: var(--text-dim);
  }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .quiz-round-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--emerald-soft);
    letter-spacing: 0.06em;
    font-size: 0.9rem;
  }

  .quiz-progress {
    color: var(--text-dim);
    font-weight: 600;
    font-size: 0.9rem;
  }

  .progress-bar {
    height: 6px;
    background: var(--bg-card);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 18px;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--emerald) 0%, var(--gold) 100%);
    transition: width 0.4s;
    box-shadow: 0 0 10px var(--emerald-glow);
  }

  .question-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-hi) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
  }

  .question-text {
    font-size: 1.08rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 18px;
    line-height: 1.45;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    background: var(--bg-deep);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 13px 16px;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 0.98rem;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .option:hover:not(:disabled) {
    border-color: var(--emerald);
    background: var(--bg-card-hi);
  }
  .option:disabled { cursor: default; opacity: 0.85; }

  .option-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    background: var(--bg-card-hi);
    border-radius: 6px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
    font-size: 0.85rem;
  }

  .option.correct {
    border-color: var(--correct);
    background: rgba(16, 185, 129, 0.15);
    box-shadow: 0 0 14px var(--emerald-glow);
  }
  .option.correct .option-letter { background: var(--correct); color: var(--bg-deep); }

  .option.wrong {
    border-color: var(--wrong);
    background: rgba(239, 68, 68, 0.12);
    box-shadow: 0 0 14px var(--wrong-glow);
  }
  .option.wrong .option-letter { background: var(--wrong); color: white; }

  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 10px;
    border-left: 3px solid var(--emerald);
    background: rgba(16, 185, 129, 0.08);
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.wrong { border-left-color: var(--wrong); background: rgba(239, 68, 68, 0.07); }

  .feedback-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--emerald-soft);
    letter-spacing: 0.05em;
    font-size: 0.92rem;
  }
  .feedback.wrong .feedback-title { color: #FCA5A5; }

  .feedback-text {
    color: var(--text);
    font-size: 0.95rem;
    line-height: 1.5;
  }

  .next-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-soft) 100%);
    color: var(--bg-deep);
    border: none;
    border-radius: 12px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.05rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    box-shadow: 0 4px 14px var(--emerald-glow);
    display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--emerald-glow); }

  .results-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-hi) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 22px;
    text-align: center;
    margin-top: 12px;
  }

  .results-title {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    text-shadow: 0 0 12px var(--gold-glow);
  }
  .results-round {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 22px;
  }

  .score-circle {
    width: 130px;
    height: 130px;
    margin: 0 auto 20px;
    border: 3px solid var(--gold);
    border-radius: 50%;
    background: var(--bg-deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 32px var(--gold-glow), inset 0 0 22px rgba(252, 211, 77, 0.08);
  }
  .score-num {
    font-family: 'Cinzel', serif;
    font-size: 3rem;
    color: var(--gold-soft);
    font-weight: 900;
    line-height: 1;
  }
  .score-total {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-top: 4px;
  }

  .new-best {
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-weight: 700;
    margin-bottom: 14px;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-shadow: 0 0 14px var(--gold-glow);
  }

  .score-message {
    font-size: 1.05rem;
    margin-bottom: 6px;
    font-weight: 600;
    color: var(--emerald-soft);
  }
  .score-sub {
    color: var(--text-dim);
    font-size: 0.92rem;
    margin-bottom: 24px;
  }

  .results-actions {
    display: flex;
    gap: 10px;
    flex-direction: column;
  }

  .btn {
    padding: 13px 18px;
    border-radius: 10px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    letter-spacing: 0.05em;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-soft) 100%);
    color: var(--bg-deep);
    box-shadow: 0 4px 14px var(--emerald-glow);
  }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-secondary {
    background: transparent;
    color: var(--gold-soft);
    border: 1.5px solid var(--border-gold);
  }
  .btn-secondary:hover { background: var(--bg-card-hi); border-color: var(--gold); }

  @media (max-width: 480px) {
    .home-hero h1 { font-size: 2rem; }
    .question-card { padding: 18px; }
    .question-text { font-size: 1rem; }
    .option { font-size: 0.94rem; padding: 12px 14px; }
    .score-circle { width: 110px; height: 110px; }
    .score-num { font-size: 2.5rem; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <a href="index.html" class="back-btn">← Mock Mode</a>
    <span class="subject-tag">BUSINESS</span>
  </div>

  <div class="screen active" id="home-screen">
    <div class="home-hero">
      <h1>BUSINESS</h1>
      <p class="tagline">The board is watching.</p>
    </div>
    <div class="rounds-grid" id="rounds-grid"></div>
  </div>

  <div class="screen" id="quiz-screen">
    <div class="quiz-header">
      <span class="quiz-round-name" id="quiz-round-name"></span>
      <span class="quiz-progress" id="quiz-progress"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="question-card">
      <div class="question-text" id="question-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <div class="feedback-title" id="feedback-title"></div>
        <div class="feedback-text" id="feedback-text"></div>
      </div>
    </div>
    <button class="next-btn" id="next-btn">NEXT →</button>
  </div>

  <div class="screen" id="results-screen">
    <div class="results-card">
      <div class="results-title" id="results-title">ROUND COMPLETE</div>
      <div class="results-round" id="results-round-name"></div>
      <div class="score-circle">
        <div class="score-num" id="score-num">0</div>
        <div class="score-total" id="score-total">/ 0</div>
      </div>
      <div class="new-best" id="new-best" style="display:none;">⚡ NEW BEST ⚡</div>
      <div class="score-message" id="score-message"></div>
      <div class="score-sub" id="score-sub"></div>
      <div class="results-actions">
        <button class="btn btn-primary" id="play-again-btn">PLAY AGAIN</button>
        <button class="btn btn-secondary" id="back-home-btn">CHOOSE ANOTHER ROUND</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ============================================================
   BUSINESS STUDIES QUESTION BANK
   Edexcel International GCSE — Year 10
   5 themed rounds + Hostile Takeover (Final Boss)
   ============================================================ */

const QUESTION_BANK = {

  empires: [
    { q: "A business is owned and run by ONE person, who keeps all the profits but has unlimited liability. What type of business is this?",
      options: ["Partnership", "Sole trader", "Private limited company", "Public limited company"],
      correct: 1,
      explain: "Sole trader = solo founder. Keeps all profits, takes ALL the risk. Unlimited liability means if it goes bust, personal assets are on the line." },
    { q: "What does 'unlimited liability' mean for a sole trader?",
      options: ["They can take unlimited loans from the bank", "They are personally responsible for all business debts", "They can hire unlimited employees", "They never have to pay tax"],
      correct: 1,
      explain: "Unlimited liability = if the business owes money it can't pay, your personal stuff (house, car, savings) can be taken to cover it. Brutal but real." },
    { q: "Which type of business is owned by 2-20 people who share profits and decisions?",
      options: ["Sole trader", "Partnership", "Franchise", "Public limited company"],
      correct: 1,
      explain: "Partnership = 2 to 20 owners (called partners). Profit-sharing, decision-sharing, blame-sharing. Tag team energy." },
    { q: "A McDonald's franchisee pays the franchisor a fee. What does the franchisee get in return?",
      options: ["Total control over the menu and recipes", "The right to use an established brand and business model", "100% of all profits with no fees", "Unlimited free stock"],
      correct: 1,
      explain: "Franchisees pay to use a proven brand + business model. Lower risk, instant recognition. Trade-off: less freedom — can't suddenly start selling sushi at McDonald's." },
    { q: "Which is a DISADVANTAGE of being in a partnership?",
      options: ["You always have to pay corporation tax", "Disagreements between partners can slow decisions", "Partners can't share the workload", "Profits must always be split equally"],
      correct: 1,
      explain: "Partners disagree. Always. Decisions get stuck. Plus profits split = less for each person. Classic group project energy on hard mode." },
    { q: "What does 'Ltd' stand for in a company name?",
      options: ["Listed", "Limited", "Long-term Trading Division", "Local Trade Department"],
      correct: 1,
      explain: "Ltd = Limited (private limited company). Owners have limited liability — personal assets are protected if the company collapses." },
    { q: "What's the KEY difference between a Ltd and a PLC?",
      options: ["A PLC pays no tax", "A PLC can sell shares to the public on the stock exchange", "A Ltd has unlimited liability", "A PLC must have only one owner"],
      correct: 1,
      explain: "PLC = Public Limited Company. Shares trade on the stock exchange — anyone can buy in. Ltd = private, shares only sold to invited people." },
    { q: "What is a stakeholder?",
      options: ["Someone who only owns shares in the business", "Anyone affected by or interested in the business", "Only the CEO and senior managers", "A government inspector"],
      correct: 1,
      explain: "Stakeholders = anyone with skin in the game. Owners, employees, customers, suppliers, government, local community. Shareholders are just ONE type." },
    { q: "Which of these is an INTERNAL stakeholder of Nintendo?",
      options: ["Customers buying Nintendo Switch games", "Nintendo factory workers", "The Japanese government", "Suppliers of microchips"],
      correct: 1,
      explain: "Internal = inside the business. Employees, owners, managers. External = outside (customers, suppliers, government, community)." },
    { q: "Nintendo's customers want LOW prices. Nintendo's shareholders want HIGH profits. What is this an example of?",
      options: ["Stakeholder cooperation", "Conflicting stakeholder interests", "Mass marketing", "Internal recruitment"],
      correct: 1,
      explain: "Different stakeholders, different goals. Customers vs shareholders is the classic clash. Lower prices = lower profits. Someone always loses." },
    { q: "What is a business AIM?",
      options: ["A specific, measurable target", "A long-term general goal of the business", "The price of a product", "A type of stakeholder"],
      correct: 1,
      explain: "Aim = the big-picture goal ('become the world's best gaming company'). Objective = the specific SMART target ('grow profit by 10% this year'). Aim = vibe. Objective = number." },
    { q: "What does the 'M' in SMART objectives stand for?",
      options: ["Marketing", "Measurable", "Motivated", "Maximised"],
      correct: 1,
      explain: "SMART = Specific, Measurable, Achievable, Realistic, Time-bound. Measurable means you can put a number on it. 'Increase sales' = bad. 'Increase sales by 15%' = SMART." },
    { q: "The NHS is funded by the UK government. Which sector does it belong to?",
      options: ["Private sector", "Public sector", "Tertiary sector", "Primary sector"],
      correct: 1,
      explain: "Public sector = owned/funded by government. NHS, BBC, state schools. Private sector = owned by individuals/shareholders. Nintendo, M&S, Apple." },
    { q: "Why might a successful Ltd company decide to become a PLC?",
      options: ["To pay less tax", "To raise huge capital by selling shares to the public", "To reduce the number of stakeholders", "To avoid having to publish accounts"],
      correct: 1,
      explain: "Going public = mass share sale = HUGE cash injection. Trade-off: less control (anyone can buy in, even a rival) and you must publish financials publicly." },
    { q: "A sole trader's biggest risk is...",
      options: ["Having to share profits", "Unlimited liability", "Government control", "Too many shareholders"],
      correct: 1,
      explain: "Solo = full risk. Business goes under, your personal assets get taken. Limited companies protect owners — sole traders don't have that shield." },
    { q: "Two friends want to open a bakery together. They want to share startup costs and skills. What's the best business type?",
      options: ["Sole trader", "Partnership", "PLC", "Public sector"],
      correct: 1,
      explain: "Two people sharing = partnership. Splits the workload, costs, risk. Just write a partnership agreement so you don't end up beefing over croissants later." },
    { q: "What is 'limited liability'?",
      options: ["Owners can only lose what they invested in the business", "The business has limited time to make profit", "Only a limited number of people can be employed", "The business can only sell limited products"],
      correct: 0,
      explain: "Limited liability = if the company collapses, owners lose ONLY their investment. Personal assets (house, car) are protected. Massive safety net vs sole traders." },
    { q: "Which is most likely to be the MAIN aim of a brand-new business?",
      options: ["Maximising shareholder dividends", "Survival", "Global expansion", "Hostile takeovers"],
      correct: 1,
      explain: "New businesses = vulnerable. First aim = stay alive. Profit, growth, world domination all come later. Can't dominate the world if you fold in month 3." }
  ],

  domination: [
    { q: "Mass marketing means...",
      options: ["Targeting a small specialised group", "Targeting a large broad audience with one product", "Selling only online", "Only advertising on TV"],
      correct: 1,
      explain: "Mass marketing = same product, huge audience. Coca-Cola, McDonald's, Nintendo Switch. Wide net, one big strategy." },
    { q: "Niche marketing means...",
      options: ["Targeting everyone with the same product", "Targeting a small specialised segment of the market", "Only advertising in newspapers", "Selling at the lowest possible price"],
      correct: 1,
      explain: "Niche = small, specific group with specific needs. Vegan dog food, left-handed scissors, custom mechanical keyboards. Smaller audience but they pay premium." },
    { q: "Which of these is a BENEFIT of mass marketing?",
      options: ["Lower production costs per unit due to economies of scale", "Charging premium prices to wealthy customers", "Avoiding competition", "Targeting one specific customer"],
      correct: 0,
      explain: "Mass production = make millions = each unit costs less. Economies of scale. That's why a Big Mac costs less than an artisan burger." },
    { q: "Splitting a market into groups of customers with similar needs is called...",
      options: ["Mass marketing", "Market segmentation", "Market research", "Market share"],
      correct: 1,
      explain: "Segmentation = chopping the market into groups (by age, income, location, lifestyle). Lets you target each group with the right message and product." },
    { q: "Nintendo's Super Mario games (designed for kids and families) and Nintendo's The Legend of Zelda (complex storylines aimed at teens and adults) are an example of segmenting the market by...",
      options: ["Income", "Age", "Location", "Religion"],
      correct: 1,
      explain: "Same brand, different age groups, different products. Age segmentation in action. Smart move — captures gamers from age 5 to 50+." },
    { q: "What does USP stand for?",
      options: ["Universal Selling Process", "Unique Selling Point", "Ultimate Sales Profit", "United Stakeholder Program"],
      correct: 1,
      explain: "Unique Selling Point — the thing that makes your product different from competitors. Nintendo Switch's USP? It's the only console that's BOTH a handheld AND a home console. No competitor matches that." },
    { q: "The marketing mix is also known as the...",
      options: ["3 Cs", "4 Ps", "5 Ss", "7 Es"],
      correct: 1,
      explain: "4 Ps = Product, Price, Place, Promotion. The four levers every marketer pulls. Get all four right and you've got a winning strategy." },
    { q: "A business sets a HIGH price for a brand-new innovative product, then drops the price later. This pricing strategy is called...",
      options: ["Penetration pricing", "Price skimming", "Competitive pricing", "Loss leader"],
      correct: 1,
      explain: "Skimming = high launch price, milk the early adopters, then drop. Apple does this with iPhones. Penetration = opposite — start LOW to grab market share fast." },
    { q: "A new business sets very LOW prices to attract customers and steal market share. This is called...",
      options: ["Price skimming", "Penetration pricing", "Premium pricing", "Cost-plus pricing"],
      correct: 1,
      explain: "Penetration pricing = low price to crash into the market and grab share. Once customers are loyal, raise prices. Streaming services love this trick." },
    { q: "Which is a benefit of strong BRANDING?",

const ROUNDS = [
  { key: 'empires',     title: 'BUSINESS EMPIRES',    icon: '🏛️', tagline: 'Ownership & stakeholders',         qCount: 10 },
  { key: 'domination',  title: 'MARKET DOMINATION',   icon: '🎯', tagline: 'Marketing strategy',                qCount: 10 },
  { key: 'intel',       title: 'INTEL OPS',           icon: '🔍', tagline: 'Market research',                   qCount: 10 },
  { key: 'hire',        title: 'HIRE & FIRE',         icon: '💼', tagline: 'Recruitment & functional areas',    qCount: 10 },
  { key: 'boardroom',   title: 'BOARDROOM POLITICS',  icon: '⚔️', tagline: 'Motivation, structure, comms',      qCount: 10 },
  { key: 'finalboss',   title: 'HOSTILE TAKEOVER',    icon: '👑', tagline: '15 random — your final pitch',      qCount: 15, isFinal: true }
];

const STORAGE_KEY = 'business-mock-mode-v1';

const state = {
  questions: [],
  qIndex: 0,
  score: 0,
  answered: false,
  currentRound: null
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getBestScores() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function setBestScore(roundKey, score) {
  const scores = getBestScores();
  scores[roundKey] = score;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(scores)); } catch {}
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function renderHome() {
  const grid = document.getElementById('rounds-grid');
  const bests = getBestScores();
  grid.innerHTML = '';

  ROUNDS.forEach(round => {
    const best = bests[round.key];
    const bestText = best !== undefined
      ? `BEST ${best}/${round.qCount}`
      : `${round.qCount} QUESTIONS`;
    const bestClass = best !== undefined ? 'round-best' : 'round-best empty';

    const card = document.createElement('div');
    card.className = 'round-card' + (round.isFinal ? ' final' : '');
    card.innerHTML = `
      <div class="round-card-top">
        <div class="round-icon">${round.icon}</div>
        <div class="${bestClass}">${bestText}</div>
      </div>
      <h3>${round.title}</h3>
      <div class="desc">${round.tagline}</div>
    `;
    card.addEventListener('click', () => startRound(round));
    grid.appendChild(card);
  });
}

function startRound(round) {
  state.currentRound = round;
  state.qIndex = 0;
  state.score = 0;
  state.answered = false;

  let pool;
  if (round.isFinal) {
    pool = Object.values(QUESTION_BANK).flat();
  } else {
    pool = QUESTION_BANK[round.key];
  }

  state.questions = shuffle(pool).slice(0, round.qCount);

  showScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  state.answered = false;

  const q = state.questions[state.qIndex];
  document.getElementById('quiz-round-name').textContent = `${state.currentRound.icon} ${state.currentRound.title}`;
  document.getElementById('quiz-progress').textContent = `${state.qIndex + 1} / ${state.questions.length}`;
  document.getElementById('progress-fill').style.width = `${(state.qIndex / state.questions.length) * 100}%`;
  document.getElementById('question-text').textContent = q.q;

  // Shuffle option order so correct answer moves position every time
  const indices = [0, 1, 2, 3];
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  state.optionMap = indices;

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  indices.forEach((origIdx, displayIdx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letters[displayIdx]}</span><span>${q.options[origIdx]}</span>`;
    btn.addEventListener('click', () => handleAnswer(origIdx));
    optionsEl.appendChild(btn);
  });

  const feedback = document.getElementById('feedback');
  feedback.className = 'feedback';
  feedback.classList.remove('show', 'wrong');

  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.remove('show');
}

function handleAnswer(choice) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.qIndex];
  const correct = choice === q.correct;
  const allButtons = document.querySelectorAll('.option');

  allButtons.forEach((b, i) => {
    b.disabled = true;
    const origIdx = state.optionMap[i];
    if (origIdx === q.correct) b.classList.add('correct');
    else if (origIdx === choice) b.classList.add('wrong');
  });

  const feedback = document.getElementById('feedback');
  const feedbackTitle = document.getElementById('feedback-title');
  const feedbackText = document.getElementById('feedback-text');

  if (correct) {
    state.score++;
    feedbackTitle.textContent = '✓ NAILED IT';
    feedback.classList.add('show');
  } else {
    feedbackTitle.textContent = '✗ NOT QUITE';
    feedback.classList.add('show', 'wrong');
  }
  feedbackText.textContent = q.explain;

  document.getElementById('progress-fill').style.width = `${((state.qIndex + 1) / state.questions.length) * 100}%`;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = state.qIndex === state.questions.length - 1 ? 'SEE RESULTS →' : 'NEXT →';
  nextBtn.classList.add('show');
}

document.getElementById('next-btn').addEventListener('click', () => {
  state.qIndex++;
  if (state.qIndex >= state.questions.length) showResults();
  else renderQuestion();
});

function showResults() {
  showScreen('results-screen');
  const total = state.questions.length;
  const score = state.score;
  const pct = (score / total) * 100;

  document.getElementById('results-round-name').textContent = `${state.currentRound.icon} ${state.currentRound.title}`;
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-total').textContent = `/ ${total}`;

  let msg, sub;
  if (pct === 100)      { msg = '👑 FLAWLESS PITCH 👑'; sub = 'The board stood up. Untouchable performance.'; }
  else if (pct >= 80)   { msg = '💎 BOARDROOM-READY';   sub = 'That was clean. Run it back to lock it in.'; }
  else if (pct >= 60)   { msg = '📈 SOLID PLAY';         sub = 'Strong base. The slips are exactly where to focus next.'; }
  else if (pct >= 40)   { msg = '🎯 BUILDING THE EMPIRE'; sub = 'Not bad at all. Every miss = a study tip in disguise.'; }
  else                   { msg = '🛠️ CONSTRUCTION PHASE'; sub = 'No stress. The board respects the grind. Go again.'; }

  document.getElementById('score-message').textContent = msg;
  document.getElementById('score-sub').textContent = sub;

  const bests = getBestScores();
  const previousBest = bests[state.currentRound.key];
  const newBestEl = document.getElementById('new-best');
  if (previousBest === undefined || score > previousBest) {
    setBestScore(state.currentRound.key, score);
    newBestEl.style.display = 'block';
  } else {
    newBestEl.style.display = 'none';
  }
}

document.getElementById('play-again-btn').addEventListener('click', () => startRound(state.currentRound));
document.getElementById('back-home-btn').addEventListener('click', () => {
  renderHome();
  showScreen('home-screen');
});

renderHome();
</script>
</body>
</html>
