<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Biology &middot; Mock Mode</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0807'/%3E%3Ccircle cx='50' cy='50' r='32' fill='none' stroke='%23d4af37' stroke-width='3'/%3E%3Ccircle cx='50' cy='50' r='14' fill='%23d4af37'/%3E%3Ccircle cx='50' cy='50' r='5' fill='%23f5d76e'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0807'/%3E%3Ccircle cx='50' cy='50' r='32' fill='none' stroke='%23d4af37' stroke-width='3'/%3E%3Ccircle cx='50' cy='50' r='14' fill='%23d4af37'/%3E%3Ccircle cx='50' cy='50' r='5' fill='%23f5d76e'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0807;
  --surface: #15110d;
  --surface-2: #1f1812;
  --border: #2a2018;
  --border-bright: #3d2f20;
  --gold: #d4af37;
  --gold-bright: #f5d76e;
  --gold-dim: #8a7430;
  --gold-glow: rgba(212, 175, 55, 0.25);
  --crimson: #8b0a0a;
  --crimson-bright: #c41e3a;
  --crimson-glow: rgba(196, 30, 58, 0.3);
  --text: #e8dcc4;
  --text-muted: #9a8a70;
  --text-dim: #6b5e4a;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(212, 175, 55, 0.08), transparent 60%);
}
.wrap {
  position: relative; z-index: 1;
  max-width: 560px; margin: 0 auto;
  padding: max(env(safe-area-inset-top), 1.5rem) 1rem max(env(safe-area-inset-bottom), 1.5rem);
}
.hub-link {
  display: inline-block;
  font-family: 'Cinzel', Georgia, serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  margin-bottom: 1rem;
  padding: 4px 0;
}
.hub-link:hover { color: var(--gold); }

.title {
  font-family: 'Cinzel', Georgia, serif;
  font-weight: 700;
  font-size: clamp(22px, 6vw, 28px);
  letter-spacing: 0.15em;
  text-align: center;
  color: var(--gold);
  margin: 0 0 6px;
  text-shadow: 0 0 30px var(--gold-glow);
}
.subtitle {
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
  margin: 0 0 1.5rem;
  font-style: italic;
}
.divider {
  height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: 1.25rem 0; opacity: 0.6;
}
.section-label {
  font-family: 'Cinzel', Georgia, serif;
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin: 0 0 12px;
  text-align: center;
}
.lifetime {
  display: flex; justify-content: center; gap: 1.5rem;
  font-size: 12px; color: var(--text-muted);
  margin: 0 0 1.5rem;
}
.lifetime span b { color: var(--gold); font-weight: 500; }

.round-btn {
  display: block; width: 100%;
  text-align: left; padding: 14px 16px;
  margin-bottom: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  position: relative;
}
.round-btn:hover, .round-btn:active {
  background: var(--surface-2);
  border-color: var(--border-bright);
  transform: translateY(-1px);
}
.round-name {
  font-family: 'Cinzel', Georgia, serif;
  font-size: 14px;
  letter-spacing: 0.05em;
  color: var(--text);
  display: block;
}
.round-topic {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-muted);
  margin-top: 3px;
  display: block;
}
.round-stats {
  font-size: 11px;
  color: var(--gold-dim);
  margin-top: 6px;
  display: block;
  letter-spacing: 0.05em;
}
.round-stats b { color: var(--gold); font-weight: 500; }

.boss-btn {
  background: linear-gradient(180deg, #1a1310 0%, #0e0a07 100%);
  border: 1px solid var(--gold);
  box-shadow: 0 0 20px var(--gold-glow), inset 0 0 12px rgba(212, 175, 55, 0.05);
  position: relative;
}
.boss-btn:hover, .boss-btn:active {
  border-color: var(--gold-bright);
  box-shadow: 0 0 30px var(--gold-glow), inset 0 0 16px rgba(212, 175, 55, 0.08);
}
.boss-btn .round-name {
  color: var(--gold);
  letter-spacing: 0.12em;
}

.boss-badge {
  display: inline-block;
  font-family: 'Cinzel', Georgia, serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  background: var(--gold);
  color: var(--bg);
  padding: 2px 8px;
  border-radius: 2px;
  margin-bottom: 8px;
  font-weight: 700;
}

.back-btn {
  background: none; border: none;
  color: var(--text-muted);
  font-size: 13px;
  padding: 4px 0;
  margin-bottom: 14px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.05em;
}
.back-btn:hover { color: var(--gold); }

.q-header {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 12px;
  letter-spacing: 0.05em;
}
.q-header b { color: var(--gold); font-weight: 500; }

.progress {
  height: 3px;
  background: var(--surface);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  transition: width 0.3s ease;
  box-shadow: 0 0 8px var(--gold-glow);
}

.question {
  font-family: 'Cinzel', Georgia, serif;
  font-size: 17px;
  font-weight: 500;
  line-height: 1.4;
  margin: 0 0 1.25rem;
  color: var(--text);
}

.opt {
  display: block; width: 100%;
  text-align: left;
  padding: 14px 16px;
  margin-bottom: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  font-size: 15px;
  line-height: 1.4;
  transition: all 0.2s ease;
}
.opt:hover:not(:disabled), .opt:active:not(:disabled) {
  background: var(--surface-2);
  border-color: var(--gold-dim);
}
.opt:disabled { cursor: default; }

.opt.correct {
  background: rgba(212, 175, 55, 0.15);
  border-color: var(--gold);
  color: var(--gold-bright);
  box-shadow: 0 0 16px var(--gold-glow);
  animation: pulse-gold 0.4s ease;
}
.opt.wrong {
  background: rgba(139, 10, 10, 0.25);
  border-color: var(--crimson-bright);
  color: #ffb0b0;
  box-shadow: 0 0 16px var(--crimson-glow);
  animation: shake 0.4s ease;
}
.opt.dim { opacity: 0.4; }

@keyframes pulse-gold {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.explain {
  margin-top: 14px;
  padding: 14px 16px;
  background: var(--surface);
  border-left: 2px solid var(--gold);
  border-radius: 4px;
  font-size: 14px;
  line-height: 1.55;
  color: var(--text);
  animation: fade-up 0.3s ease;
}
.explain b {
  font-family: 'Cinzel', Georgia, serif;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 0.05em;
  display: inline-block;
  margin-right: 4px;
}
.explain.crimson { border-left-color: var(--crimson-bright); }
.explain.crimson b { color: var(--crimson-bright); }

.next-btn {
  display: block; width: 100%;
  margin-top: 14px;
  padding: 14px;
  background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  font-family: 'Cinzel', Georgia, serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  animation: fade-up 0.3s ease 0.1s both;
}
.next-btn:active { transform: scale(0.98); }

.results {
  text-align: center;
  padding: 1.5rem 0 0.5rem;
}
.verdict {
  font-family: 'Cinzel', Georgia, serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--gold);
  margin: 0 0 1rem;
  text-shadow: 0 0 20px var(--gold-glow);
  animation: fade-up 0.4s ease;
}
.verdict.crimson { color: var(--crimson-bright); text-shadow: 0 0 20px var(--crimson-glow); }
.score-big {
  font-family: 'Cinzel', Georgia, serif;
  font-size: 64px;
  font-weight: 700;
  color: var(--gold);
  margin: 8px 0;
  line-height: 1;
  text-shadow: 0 0 30px var(--gold-glow);
  animation: fade-up 0.4s ease 0.1s both;
}
.score-pct {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-bottom: 1.5rem;
}
.score-best {
  font-size: 12px;
  color: var(--gold-dim);
  letter-spacing: 0.05em;
  margin-bottom: 1.5rem;
  font-style: italic;
}
.msg {
  font-size: 15px;
  line-height: 1.55;
  color: var(--text);
  margin: 1rem 0 1.5rem;
  padding: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  text-align: left;
  animation: fade-up 0.4s ease 0.2s both;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.action-btn {
  padding: 14px;
  border-radius: 6px;
  font-family: 'Cinzel', Georgia, serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
}
.action-btn.primary {
  background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
  color: var(--bg);
  border-color: var(--gold);
  font-weight: 700;
}
.action-btn:active { transform: scale(0.98); }

.footer {
  text-align: center;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-family: 'Cinzel', Georgia, serif;
}
</style>
</head>
<body>
<div class="wrap">
  <div id="app"></div>
</div>

<script>
const Q = {
  cells: [
    {q:"Which organelle releases energy through respiration?",o:["Nucleus","Ribosome","Mitochondrion","Cell membrane"],a:2,e:"Mitochondria release energy from glucose via respiration. Like your Beyblade launcher \u2014 stores energy, then releases it."},
    {q:"Where in a cell does protein synthesis happen?",o:["Nucleus","Mitochondrion","Cell membrane","Ribosome"],a:3,e:"Ribosomes are the tiny dots that build proteins by joining amino acids. The nucleus holds the instructions, ribosomes do the building."},
    {q:"An Amoeba on a diagram is 13 mm long at \u00d765 magnification. Real length?",o:["845 \u03bcm","200 \u03bcm","20 \u03bcm","0.2 \u03bcm"],a:1,e:"Actual = image \u00f7 magnification = 13 \u00f7 65 = 0.2 mm = 200 \u03bcm. Always convert mm to \u03bcm at the end."},
    {q:"Which structure is in plant cells but NOT animal cells?",o:["Mitochondria","Ribosomes","Cell wall","Nucleus"],a:2,e:"Plants have a rigid cellulose cell wall. Animal cells just have a flexible membrane."},
    {q:"Which is NOT found in a virus?",o:["Genetic material","Protein coat","Cytoplasm","Outer surface"],a:2,e:"Viruses aren't even cells \u2014 no cytoplasm, no organelles. Just genetic material in a protein coat."},
    {q:"Which structure contains chromosomes?",o:["Cytoplasm","Mitochondrion","Nucleus","Cell membrane"],a:2,e:"Chromosomes (made of DNA) live inside the nucleus \u2014 the cell's instruction library."},
    {q:"A skin cell has 510 mitochondria. A villus cell has 2000. Why?",o:["Villus cells are bigger","Villus cells need more energy","Skin is dying","Random variation"],a:1,e:"More mitochondria = more energy released. Villus cells actively transport nutrients into the blood \u2014 that needs LOTS of energy."},
    {q:"What's special about a virus compared to a bacterium?",o:["Viruses are bigger","Viruses have a nucleus","Viruses can't reproduce alone","Viruses have ribosomes"],a:2,e:"Viruses must hijack a host cell to reproduce. Bacteria are full living cells that reproduce on their own."},
    {q:"What's the function of the cell membrane?",o:["Hold the DNA","Make energy","Control what enters and leaves","Build proteins"],a:2,e:"The cell membrane is selectively permeable \u2014 decides what gets in and out. Like a bouncer for the cell."},
    {q:"A diagram is \u00d7100 magnified. Leaf is 50 mm thick on diagram. Real thickness?",o:["5 mm","0.5 mm","0.05 mm","5000 mm"],a:1,e:"Actual = image \u00f7 magnification = 50 \u00f7 100 = 0.5 mm. Don't get tripped up by units \u2014 already in mm."},
    {q:"Why do sperm cells have lots of mitochondria?",o:["To carry DNA","Swimming needs energy","To attack the egg","For show"],a:1,e:"Sperm have a long journey and swim with their tails. All that movement needs energy from respiration \u2192 lots of mitochondria."},
    {q:"Which type of cell does NOT have a nucleus?",o:["Animal cell","Plant cell","Bacterium","Skin cell"],a:2,e:"Bacteria are prokaryotes \u2014 DNA floats freely, no nucleus. Animal and plant cells (eukaryotes) keep DNA inside a nucleus."},
    {q:"Which has chloroplasts?",o:["Animal cells","Bacteria","Plant cells","Viruses"],a:2,e:"Only plant cells (and some algae) have chloroplasts \u2014 the green organelles that do photosynthesis."},
    {q:"Which structure makes proteins using instructions from the nucleus?",o:["Mitochondrion","Cell wall","Ribosome","Vacuole"],a:2,e:"Nucleus holds the instruction. The instruction goes to ribosomes, which read it and assemble amino acids into the protein."},
    {q:"How do bacteria reproduce?",o:["Mitosis","Splitting in two (binary fission)","Laying eggs","Photosynthesis"],a:1,e:"Bacteria just split in half to make copies. Super fast and simple \u2014 that's why bacterial infections multiply so quickly."},
    {q:"A virus infecting a cell uses the cell's own ribosomes to...",o:["Eat them","Make more virus proteins","Hide","Photosynthesise"],a:1,e:"Viruses can't make proteins themselves. They hijack the host's ribosomes to build new virus parts. The host cell becomes a virus factory."}
  ],
  heart: [
    {q:"Which vessel carries oxygenated blood from lungs to heart?",o:["Aorta","Vena cava","Pulmonary artery","Pulmonary vein"],a:3,e:"The pulmonary vein is the exception \u2014 a vein that carries oxygenated blood, from the lungs back to the heart's left side."},
    {q:"Why is the left ventricle wall thicker than the right?",o:["Pumps blood to the body","Pumps blood to the lungs","Collects blood from veins","Holds more blood"],a:0,e:"The left ventricle pumps blood all the way around the body \u2014 needs more muscle and pressure. The right only pumps to the nearby lungs."},
    {q:"Which blood vessel has the highest pressure?",o:["Vena cava","Aorta","Pulmonary vein","Pulmonary artery"],a:1,e:"The aorta gets blood pumped at full force from the left ventricle, so the highest pressure of any vessel in the body."},
    {q:"What's the function of semi-lunar valves?",o:["Pump blood out","Stop blood flowing back into ventricles","Filter blood","Open the atria"],a:1,e:"Semi-lunar valves sit at the base of the aorta and pulmonary artery. They snap shut so blood can't flow back into the ventricles."},
    {q:"A heart attack damages muscle because...",o:["Too much oxygen","Blood supply blocked \u2192 cells get no oxygen \u2192 they die","Too much exercise","Cold weather"],a:1,e:"Heart muscle needs constant oxygen from coronary arteries. Block one \u2192 no oxygen \u2192 muscle cells can't respire \u2192 they die."},
    {q:"The aorta is what type of vessel?",o:["Vein","Capillary","Artery","Bronchiole"],a:2,e:"Aorta is the biggest artery in the body \u2014 carries oxygenated blood out from the left ventricle to everywhere else."},
    {q:"Vessel that brings DEoxygenated blood to the heart?",o:["Aorta","Pulmonary vein","Vena cava","Coronary artery"],a:2,e:"Vena cava brings deoxygenated blood from the body back into the right atrium. Pulmonary artery then takes it to the lungs."},
    {q:"The right ventricle pumps blood to which organ?",o:["The body","The lungs","The brain","The stomach"],a:1,e:"Right ventricle \u2192 pulmonary artery \u2192 lungs to pick up oxygen. Then back to the left side via the pulmonary vein."},
    {q:"What do capillaries do?",o:["Pump blood","Exchange substances with cells","Carry blood away from heart","Store fat"],a:1,e:"Capillaries are tiny vessels with walls one cell thick \u2014 perfect for swapping O\u2082, CO\u2082, glucose etc. with surrounding cells."},
    {q:"Why do veins have valves?",o:["High pressure inside","Low pressure \u2014 valves prevent backflow","For decoration","To filter blood"],a:1,e:"Vein blood is low pressure (already passed through capillaries). Valves stop it pooling backwards, especially in your legs."},
    {q:"Arteries vs veins \u2014 what's the key difference?",o:["Arteries away from heart, thick wall; veins to heart, thin wall + valves","They're identical","Veins carry only oxygenated blood","Arteries are smaller"],a:0,e:"A for Away (arteries). Veins return blood at low pressure, hence valves. Arteries have thick muscular walls to handle high pressure."},
    {q:"Which vessels supply blood to the heart muscle itself?",o:["Pulmonary arteries","Coronary arteries","Vena cava","Aorta"],a:1,e:"Coronary arteries branch off the aorta and feed oxygen to the heart muscle. Block one = heart attack."},
    {q:"What's the difference between atria and ventricles?",o:["Atria pump out, ventricles receive","Atria receive blood, ventricles pump it out","They do the same thing","Atria are below ventricles"],a:1,e:"Atria are the top chambers \u2014 receive blood. Ventricles are the bottom chambers \u2014 pump it out with much more force."},
    {q:"Which valve type prevents backflow into ventricles from arteries?",o:["Atrioventricular","Semi-lunar","Bicuspid","Mitral"],a:1,e:"Semi-lunar valves are at the start of the aorta and pulmonary artery. When ventricles relax, the valves close so blood can't flow backward."}
  ],
  enzymes: [
    {q:"Which enzyme breaks down protein into amino acids?",o:["Maltase","Amylase","Protease","Lipase"],a:2,e:"Protease (like pepsin in the stomach) breaks proteins into amino acids. Maltase = maltose, amylase = starch, lipase = fats."},
    {q:"What happens to an enzyme if it gets too hot?",o:["Speeds up forever","It denatures","It multiplies","It freezes"],a:1,e:"Heat warps the active site. The enzyme is denatured \u2014 shape wrecked, substrates won't fit. Like a chipped Beyblade tip."},
    {q:"Stomach enzymes work best at what pH?",o:["pH 2","pH 7","pH 9","pH 14"],a:0,e:"The stomach is super acidic (pH 1\u20132) thanks to hydrochloric acid. Stomach protease (pepsin) is built for that environment."},
    {q:"What's the optimum pH for an enzyme found in the mouth?",o:["pH 1","pH 2.5","pH 6.2","pH 10"],a:2,e:"Saliva is roughly neutral (around pH 6\u20137). Salivary amylase works there \u2014 way different from stomach enzymes."},
    {q:"Maltase breaks maltose into...",o:["Amino acids","Fatty acids","Glucose","Starch"],a:2,e:"Maltase splits maltose into two glucose molecules. Part of digestion in the small intestine."},
    {q:"What happens to enzyme activity at very low pH (way below optimum)?",o:["Speeds up","Stays the same","Slows down or stops because shape changes","Enzymes multiply"],a:2,e:"Wrong pH (too acidic OR too alkaline) changes the active site shape \u2014 substrates can't bind so the rate drops massively."},
    {q:"Which enzyme is used in genetic modification?",o:["Amylase","Maltase","Restriction enzyme","Lipase"],a:2,e:"Restriction enzymes cut DNA at specific sequences \u2014 like genetic scissors. Used to splice genes from one organism into another."},
    {q:"A graph shows enzyme P peaks at pH 2.5. Where is it most likely active?",o:["Mouth","Small intestine","Stomach","Nucleus"],a:2,e:"pH 2.5 is super acidic \u2014 that's stomach territory. Enzyme P is probably pepsin (a stomach protease)."},
    {q:"Where does most digestion of starch begin?",o:["Stomach","Mouth \u2014 saliva contains amylase","Liver","Small intestine"],a:1,e:"Salivary amylase starts breaking down starch into smaller sugars (like maltose) the moment you start chewing."},
    {q:"Lipase breaks down...?",o:["Protein","Starch","Fats into fatty acids and glycerol","DNA"],a:2,e:"Lipase digests fats into fatty acids and glycerol. Made by the pancreas, works in the small intestine."},
    {q:"What does the 'lock and key' model describe?",o:["How cells reproduce","How enzymes' active sites fit a specific substrate","How DNA replicates","How muscles contract"],a:1,e:"The active site has a specific shape. Only the matching substrate (the 'key') fits in. That's why enzymes are so specific to one reaction."},
    {q:"Optimum temperature for most human enzymes?",o:["0\u00b0C","25\u00b0C","37\u00b0C","100\u00b0C"],a:2,e:"37\u00b0C is normal body temperature \u2014 your enzymes evolved to work fastest here. Higher = denature, lower = sluggish."},
    {q:"What does bile do? (It's not an enzyme)",o:["Digests protein","Emulsifies fats into smaller droplets","Kills bacteria","Makes glucose"],a:1,e:"Bile breaks fat into tiny droplets \u2014 bigger surface area for lipase to work on. Speeds up fat digestion massively."},
    {q:"Below the optimum temperature, what happens to enzyme activity?",o:["Faster","Slower \u2014 fewer collisions with substrate","Denatured","No change"],a:1,e:"Cold = particles move slower = fewer enzyme-substrate collisions = slower reaction. Not denatured though \u2014 they recover when warmed up."},
    {q:"The pancreas releases its enzymes into the...?",o:["Stomach","Mouth","Small intestine","Liver"],a:2,e:"Pancreatic enzymes (lipase, protease, amylase) flow into the small intestine where most digestion actually happens."}
  ],
  lungs: [
    {q:"When you breathe IN, what does the diaphragm do?",o:["Relaxes and moves up","Contracts and moves down","Disappears","Stays still"],a:1,e:"Diaphragm contracts and flattens downward \u2192 chest cavity expands \u2192 lower pressure \u2192 air rushes in."},
    {q:"Correct path of air into the lungs?",o:["Trachea \u2192 bronchus \u2192 bronchiole \u2192 alveolus","Bronchus \u2192 trachea \u2192 alveolus \u2192 bronchiole","Alveolus \u2192 trachea \u2192 bronchus \u2192 bronchiole","Trachea \u2192 bronchiole \u2192 alveolus \u2192 bronchus"],a:0,e:"Big tube (trachea) \u2192 branches (bronchi) \u2192 smaller branches (bronchioles) \u2192 tiny air sacs (alveoli) where gas exchange happens."},
    {q:"Which gas STAYS the same % between inhaled and exhaled air?",o:["Oxygen","Carbon dioxide","Nitrogen","Water vapour"],a:2,e:"Your body doesn't use nitrogen, so it just goes in and back out. O\u2082 drops (used for respiration), CO\u2082 rises (waste product)."},
    {q:"Why is the palisade layer at the TOP of the leaf?",o:["To look pretty","To absorb the most sunlight","To store water","To allow gas exchange"],a:1,e:"Palisade layer is packed with chloroplasts. Putting it near the top means it grabs the most light for photosynthesis."},
    {q:"Where are stomata usually found on a normal leaf?",o:["Only on the upper surface","Mainly on the lower surface","On the stem","Inside the xylem"],a:1,e:"Stomata are mostly on the underside to reduce water loss (cooler, shaded). Water lilies are flipped because their underside sits in water."},
    {q:"The xylem transports...",o:["Sugars","Amino acids","Water and minerals","Oxygen"],a:2,e:"Xylem = water transport. Phloem = food transport (sugars + amino acids). Two different tube systems."},
    {q:"The phloem transports...",o:["Water only","Sugars and amino acids","CO\u2082","Blood"],a:1,e:"Phloem moves the products of photosynthesis (mostly sugars) and amino acids around the plant \u2014 both up and down."},
    {q:"Which feature of alveoli helps gas exchange?",o:["Thick walls","Big surface area","Dry surface","Slow blood flow"],a:1,e:"Alveoli have huge total surface area, very thin walls (1 cell), moist surface, great blood supply. Perfect for gas exchange."},
    {q:"How are fish gills similar to alveoli?",o:["They have lungs too","Both have huge surface area, thin walls, good blood supply","Both are dry","Both store water"],a:1,e:"Same engineering, different setup. Gills have feathery filaments for surface area, plus thin walls and lots of blood vessels."},
    {q:"Which part of the leaf is the waxy waterproof layer on top?",o:["Stomata","Xylem","Cuticle","Spongy mesophyll"],a:2,e:"The cuticle is a waxy waterproof coating on top \u2014 stops water evaporating out of the upper surface."},
    {q:"Why does the spongy mesophyll have air gaps?",o:["To make leaves lighter","To let CO\u2082 and O\u2082 move easily","For decoration","To store sugar"],a:1,e:"Air spaces let gases diffuse easily. CO\u2082 in for photosynthesis, O\u2082 out as waste."},
    {q:"What does CO\u2082 rise from in inhaled to exhaled air?",o:["4% to 0.04%","0.04% to 4%","20% to 16%","79% to 79%"],a:1,e:"CO\u2082 is a respiration waste product. Cells dump it into blood, lungs exhale it \u2014 exhaled air has way more CO\u2082."},
    {q:"Where do plants get glucose from?",o:["The soil","Photosynthesis","Eating insects","The air directly"],a:1,e:"Plants make their own glucose using CO\u2082 and water with light energy (photosynthesis). Then use it for respiration, growth, etc."},
    {q:"The villus is found in the...",o:["Lungs","Heart","Small intestine","Brain"],a:2,e:"Villi are tiny finger-like projections in the small intestine. Massively increase surface area for absorbing digested food into the blood."},
    {q:"A small branching tube inside the lung is called a...",o:["Alveolus","Bronchiole","Trachea","Diaphragm"],a:1,e:"Bronchioles are smaller branches off the bronchi. They eventually lead to clusters of alveoli at their tips."},
    {q:"Why do water lily leaves have stomata only on the UPPER surface?",o:["Bottom is in water \u2014 stomata would be useless underwater","Lilies are upside down","Sunlight hits the bottom","Random"],a:0,e:"Stomata need to exchange gases with AIR. The underside of a lily pad is submerged in water, so stomata down there couldn't function."},
    {q:"Air in the alveoli has 14% O\u2082 but exhaled air has 16% O\u2082. Why?",o:["Exhaled air mixes with fresh air in the airways","Lungs add oxygen back in","Mistake in the data","Plants are nearby"],a:0,e:"When you exhale, alveolar air mixes with air still in your trachea/bronchi (which is closer to inhaled). So exhaled air looks slightly less used."},
    {q:"Inhaled air is 20% O\u2082. Exhaled is 16%. What happened to the missing 4%?",o:["The lungs ate it","Cells used it for respiration","It turned into nitrogen","Nothing"],a:1,e:"Cells take O\u2082 from blood for respiration (releasing energy from glucose). That's why exhaled air has less \u2014 your body kept some."},
    {q:"Which gas is used UP in respiration?",o:["Carbon dioxide","Nitrogen","Oxygen","Methane"],a:2,e:"Respiration: glucose + oxygen \u2192 CO\u2082 + water + energy. So O\u2082 is used, CO\u2082 is produced."},
    {q:"Which feature of the leaf reduces water loss?",o:["Spongy mesophyll","Palisade cells","Waxy cuticle","Xylem"],a:2,e:"The waxy cuticle is a waterproof layer on the upper surface \u2014 like a raincoat. Stops too much water evaporating."},
    {q:"Take a fish out of water \u2014 why does it die?",o:["Cold air","Gill filaments stick together \u2192 tiny surface area","No food","Fish hate air"],a:1,e:"In water, gill filaments fan out to maximise surface area. In air they collapse and clump \u2014 fish can't get enough oxygen."},
    {q:"What does the diaphragm do when you breathe OUT?",o:["Contracts and moves down","Relaxes and moves up","Disappears","Stays flat"],a:1,e:"Opposite of breathing in. Diaphragm relaxes, domes upward, chest cavity shrinks, pressure rises, air pushes out."},
    {q:"Which substance moves OUT of cells during gas exchange in the lungs?",o:["Oxygen","Carbon dioxide","Glucose","Water"],a:1,e:"CO\u2082 diffuses from blood (high concentration) into alveoli (lower concentration) so it can be exhaled. O\u2082 goes the opposite way."},
    {q:"What feature is shared by alveoli, villi, AND gills?",o:["They all carry blood","Large surface area for exchange","They all make ATP","They all have nuclei"],a:1,e:"Three different organs, same engineering trick \u2014 maximise surface area to maximise the rate of exchange. Biology loves this pattern."},
    {q:"Aquarium oxygen drops rapidly between aerator uses. What does it suggest?",o:["The aerator works perfectly","Fish use O\u2082 faster than it's replaced","Plants are dying","Water is too cold"],a:1,e:"If oxygen drops sharply, fish (and bacteria) are using it up faster than aerator + plants can replenish. Sign conditions might not be ideal."},
    {q:"Why might LARGE bubbles from an aerator be worse than small bubbles?",o:["Big bubbles look nicer","Small bubbles have more surface area for O\u2082 to dissolve","Large bubbles freeze water","Fish prefer big bubbles"],a:1,e:"Smaller bubbles = more total surface area = more oxygen dissolves. Big bubbles rise too fast and don't transfer as much O\u2082."}
  ],
  osmosis: [
    {q:"Osmosis is the movement of...",o:["Any molecule from low to high","Water through a partially permeable membrane","Glucose using ATP","Oxygen into cells"],a:1,e:"Osmosis is specifically WATER moving through a partially permeable membrane, from dilute to concentrated. No energy needed."},
    {q:"Why are stem cells useful for repairing damaged hearts?",o:["They make blood","They can become any cell type","They kill viruses","They store oxygen"],a:1,e:"Stem cells are undifferentiated \u2014 they haven't decided what to be yet. So they can become heart muscle cells and replace damaged tissue."},
    {q:"A potato cube placed in pure water gains mass. Why?",o:["Absorbs sugar","Water moves IN by osmosis","It grows new cells","Water evaporates"],a:1,e:"Pure water has more water than inside the potato cells. Water moves IN by osmosis \u2192 cells get heavier."},
    {q:"A potato cube in 1 M sucrose loses mass. Why?",o:["Sugar dissolves it","Water moves OUT of the potato by osmosis","Active transport","Heat"],a:1,e:"Sucrose solution has less water than inside the cells. Water moves OUT by osmosis \u2192 cube gets lighter."},
    {q:"Which process needs ATP (energy)?",o:["Diffusion","Osmosis","Active transport","Sedimentation"],a:2,e:"Active transport moves molecules from low concentration to high \u2014 against the gradient. That uphill battle needs ATP."},
    {q:"Why are stem cells from the SAME person better for treatment?",o:["They're cheaper","They're less likely to be rejected","They're bigger","They glow"],a:1,e:"Your immune system recognises your own cells and won't attack them. Cells from someone else can trigger immune rejection."},
    {q:"Diffusion is...",o:["Movement of water only","Movement from high \u2192 low concentration","Needs ATP","Only happens in plants"],a:1,e:"Diffusion = ANY substance spreading from high concentration to low. No energy needed \u2014 particles just naturally spread out."},
    {q:"Put a red blood cell in pure water. What happens?",o:["Nothing","It shrinks","Water rushes in by osmosis and it bursts","It turns blue"],a:2,e:"Pure water has more water than the cell's inside. Water floods in by osmosis. Animal cells have no wall to stop them, so they burst."},
    {q:"A graph shows 45 mm/hour. What's that in mm/min?",o:["4.5","0.75","2700","7.5"],a:1,e:"Divide by 60: 45 \u00f7 60 = 0.75 mm/min. Always check what units the question asks for."},
    {q:"Why do villi need so many mitochondria?",o:["To digest food","Active transport of nutrients needs energy","To store sugar","For balance"],a:1,e:"Villi actively transport some nutrients (like glucose against the gradient) into the blood. Active transport = needs ATP = needs lots of mitochondria."},
    {q:"Formula for percentage change in mass?",o:["Final \u2212 Original","(Final \u2212 Original) \u00f7 Original \u00d7 100","Original \u00f7 Final","Final \u00d7 100"],a:1,e:"Calculate change first (final \u2212 original), divide by the original mass, then \u00d7 100. Negative = lost mass, positive = gained."},
    {q:"Original mass 2.2 g, final mass 2.3 g. Percentage change?",o:["+4.5%","\u22124.5%","+0.1%","+10%"],a:0,e:"(2.3 \u2212 2.2) \u00f7 2.2 \u00d7 100 = 0.1 \u00f7 2.2 \u00d7 100 = 4.545%. Positive because it gained water."},
    {q:"Why dry potato cylinders before weighing them in an osmosis experiment?",o:["To make them look nicer","Surface water adds fake extra mass","To kill bacteria","To make them colder"],a:1,e:"If you don't dry them, water clinging outside makes them weigh more than they should \u2014 your results would be inaccurate."},
    {q:"Diluting 1 M sucrose to 0.8 M using 16 cm\u00b3 of sucrose. How much water?",o:["0 cm\u00b3","4 cm\u00b3","8 cm\u00b3","16 cm\u00b3"],a:1,e:"Total volume needs to stay 20 cm\u00b3 to match the other tubes. 20 \u2212 16 = 4 cm\u00b3 of water. More water = lower concentration."},
    {q:"Active transport moves substances...",o:["From high to low, no energy","From low to high, using ATP","Through the nucleus","By osmosis"],a:1,e:"Active transport pushes things uphill \u2014 from low concentration to high. Requires ATP. Plant roots use it to absorb minerals."},
    {q:"Which is NOT a stem cell property?",o:["Can divide","Can become specialised cells","Already specialised","Found in embryos"],a:2,e:"Stem cells are UNDIFFERENTIATED \u2014 haven't become a specific cell type yet. Once specialised, they're not stem cells anymore."}
  ]
};

const ROUNDS = [
  {id:'cells', name:'Cells & microscopy', topic:'Organelles, viruses, magnification', count:10, pool:'cells'},
  {id:'heart', name:'Heart & circulation', topic:'Vessels, valves, ventricles', count:10, pool:'heart'},
  {id:'enzymes', name:'Enzymes & digestion', topic:'pH, denaturing, digestion', count:10, pool:'enzymes'},
  {id:'lungs', name:'Lungs, leaves & gas exchange', topic:'Breathing, photosynthesis, adaptations', count:10, pool:'lungs'},
  {id:'osmosis', name:'Osmosis & stem cells', topic:'Diffusion, transport, repair', count:10, pool:'osmosis'},
  {id:'random', name:'The Final Boss', topic:'15 questions pulled from all 87', count:15, pool:'all'}
];

const STORAGE_KEY = 'biology-boss-battle-v1';
const app = document.getElementById('app');
let state = { round: null, qIdx: 0, score: 0, answered: false, questions: [] };

function loadStats() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveStats(roundId, score, total) {
  try {
    const stats = loadStats();
    if (!stats[roundId]) stats[roundId] = { best: 0, plays: 0, totalCorrect: 0, totalQuestions: 0 };
    stats[roundId].plays++;
    stats[roundId].best = Math.max(stats[roundId].best, score);
    stats[roundId].totalCorrect += score;
    stats[roundId].totalQuestions += total;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
  } catch {}
}
function lifetimeStats() {
  const stats = loadStats();
  let plays = 0, correct = 0, total = 0;
  for (const id in stats) {
    plays += stats[id].plays;
    correct += stats[id].totalCorrect;
    total += stats[id].totalQuestions;
  }
  return { plays, accuracy: total ? Math.round((correct / total) * 100) : 0 };
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function getPool(poolId) {
  if (poolId === 'all') return [...Q.cells, ...Q.heart, ...Q.enzymes, ...Q.lungs, ...Q.osmosis];
  return Q[poolId];
}
function poolSize(poolId) {
  return poolId === 'all' ? 87 : Q[poolId].length;
}

function renderHome() {
  window.scrollTo(0, 0);
  const stats = loadStats();
  const life = lifetimeStats();
  const themed = ROUNDS.slice(0, 5).map(r => {
    const s = stats[r.id];
    const statLine = s ? `<span class="round-stats">Best <b>${s.best}/${r.count}</b> &middot; Played ${s.plays}\u00d7</span>` : `<span class="round-stats">Not yet attempted</span>`;
    return `<button class="round-btn" data-id="${r.id}">
      <span class="round-name">${r.name}</span>
      <span class="round-topic">${r.topic} \u00b7 10 from ${poolSize(r.pool)}</span>
      ${statLine}
    </button>`;
  }).join('');
  const boss = ROUNDS[5];
  const bossStats = stats[boss.id];
  const bossLine = bossStats ? `<span class="round-stats">Best <b>${bossStats.best}/${boss.count}</b> &middot; Defeated ${bossStats.plays}\u00d7</span>` : `<span class="round-stats">Awaits the worthy</span>`;
  const lifeLine = life.plays > 0 ? `<div class="lifetime"><span><b>${life.plays}</b> runs</span><span><b>${life.accuracy}%</b> accuracy</span></div>` : '';
  app.innerHTML = `
    <a href="index.html" class="hub-link">\u2190 Mock Mode</a>
    <h1 class="title">Biology</h1>
    <p class="subtitle">Drill a topic. Test it all. Replay forever.</p>
    ${lifeLine}
    <div class="divider"></div>
    <p class="section-label">Drill a topic</p>
    ${themed}
    <div class="divider"></div>
    <p class="section-label">Or test everything</p>
    <button class="round-btn boss-btn" data-id="${boss.id}">
      <span class="boss-badge">Final Boss</span>
      <span class="round-name">${boss.name}</span>
      <span class="round-topic">${boss.topic}</span>
      ${bossLine}
    </button>
    <div class="footer">Tarnished, arise.</div>
  `;
  app.querySelectorAll('.round-btn').forEach(btn => {
    btn.addEventListener('click', () => startRound(btn.dataset.id));
  });
}

function startRound(roundId) {
  const round = ROUNDS.find(r => r.id === roundId);
  state = {
    round, qIdx: 0, score: 0, answered: false,
    questions: shuffle(getPool(round.pool)).slice(0, round.count)
  };
  renderQuestion();
}

function renderQuestion() {
  window.scrollTo(0, 0);
  const q = state.questions[state.qIdx];
  const total = state.questions.length;
  const pct = (state.qIdx / total) * 100;
  const opts = q.o.map((opt, i) => `<button class="opt" data-i="${i}">${opt}</button>`).join('');
  app.innerHTML = `
    <button class="back-btn" id="home-btn">\u2190 Back to rounds</button>
    <div class="q-header">
      <span>${state.round.name} \u00b7 Q<b>${state.qIdx + 1}</b> of ${total}</span>
      <span>Score <b>${state.score}</b></span>
    </div>
    <div class="progress"><div class="progress-fill" style="width: ${pct}%"></div></div>
    <p class="question">${q.q}</p>
    <div id="opts">${opts}</div>
    <div id="feedback"></div>
  `;
  document.getElementById('home-btn').addEventListener('click', renderHome);
  app.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => selectAnswer(parseInt(btn.dataset.i)));
  });
}

function selectAnswer(picked) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.qIdx];
  const correct = picked === q.a;
  if (correct) state.score++;
  app.querySelectorAll('.opt').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.a) btn.classList.add('correct');
    else if (i === picked) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });
  const verdict = correct ? 'Correct.' : 'Not quite.';
  const explainClass = correct ? 'explain' : 'explain crimson';
  const isLast = state.qIdx >= state.questions.length - 1;
  const nextLabel = isLast ? 'See your verdict' : 'Next question';
  document.getElementById('feedback').innerHTML = `
    <div class="${explainClass}"><b>${verdict}</b> ${q.e}</div>
    <button class="next-btn" id="next-btn">${nextLabel} \u2192</button>
  `;
  document.getElementById('next-btn').addEventListener('click', advance);
}

function advance() {
  state.answered = false;
  state.qIdx++;
  if (state.qIdx >= state.questions.length) renderResults();
  else renderQuestion();
}

function renderResults() {
  window.scrollTo(0, 0);
  const total = state.questions.length;
  const score = state.score;
  const pct = Math.round((score / total) * 100);
  saveStats(state.round.id, score, total);
  const stats = loadStats();
  const best = stats[state.round.id].best;
  const isNewBest = score === best && stats[state.round.id].plays > 1 && score > 0;
  const isFirstRun = stats[state.round.id].plays === 1;

  let verdict, msg, verdictClass = '';
  if (pct === 100) {
    verdict = 'Flawless Victory';
    msg = "Pure radiance. No notes. You\u2019ve fully cooked this round \u2014 pick a harder one or just enjoy the W.";
  } else if (pct >= 80) {
    verdict = 'Worthy of Grace';
    msg = "Massive run. You\u2019ve basically locked this topic in. One more replay and it\u2019s sealed.";
  } else if (pct >= 60) {
    verdict = 'A Solid Run';
    msg = "Good work. A couple slipped through \u2014 reread the explanations on those, then come back.";
  } else if (pct >= 40) {
    verdict = 'Keep Grinding';
    msg = "You\u2019re getting there. Quick look at the cheat sheet, replay this round, easy gains incoming.";
    verdictClass = 'crimson';
  } else {
    verdict = 'Try Again, Tarnished';
    msg = "First-attempt energy. Now you know exactly which bits to drill \u2014 that\u2019s literally the win. No retry penalty, ever.";
    verdictClass = 'crimson';
  }
  let bestLine = '';
  if (isNewBest) bestLine = `<div class="score-best">\u2728 New personal best</div>`;
  else if (!isFirstRun) bestLine = `<div class="score-best">Personal best: ${best}/${total}</div>`;

  app.innerHTML = `
    <button class="back-btn" id="home-btn">\u2190 Back to rounds</button>
    <div class="results">
      <div class="verdict ${verdictClass}">${verdict}</div>
      <div class="score-big">${score}/${total}</div>
      <div class="score-pct">${pct}% \u00b7 ${state.round.name}</div>
      ${bestLine}
      <div class="msg">${msg}</div>
      <div class="actions">
        <button class="action-btn primary" id="replay-btn">Replay</button>
        <button class="action-btn" id="pick-btn">Pick another</button>
      </div>
    </div>
  `;
  document.getElementById('home-btn').addEventListener('click', renderHome);
  document.getElementById('replay-btn').addEventListener('click', () => startRound(state.round.id));
  document.getElementById('pick-btn').addEventListener('click', renderHome);
}

renderHome();
</script>
</body>
</html>
