<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mock Mode">
<meta name="theme-color" content="#0a0807">
<title>Mock Mode</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0807'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='52' font-weight='700' fill='%23d4af37' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0807'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='52' font-weight='700' fill='%23d4af37' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0807;
  --surface: #15110d;
  --surface-2: #1f1812;
  --border: #2a2018;
  --border-bright: #3d2f20;
  --gold: #d4af37;
  --gold-bright: #f5d76e;
  --gold-dim: #8a7430;
  --gold-glow: rgba(212, 175, 55, 0.25);
  --text: #e8dcc4;
  --text-muted: #9a8a70;
  --text-dim: #6b5e4a;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(212, 175, 55, 0.08), transparent 60%);
}
.wrap {
  position: relative; z-index: 1;
  max-width: 560px; margin: 0 auto;
  padding: max(env(safe-area-inset-top), 1.5rem) 1rem max(env(safe-area-inset-bottom), 1.5rem);
}
.title {
  font-family: 'Cinzel', Georgia, serif;
  font-weight: 700;
  font-size: clamp(28px, 7vw, 36px);
  letter-spacing: 0.2em;
  text-align: center;
  color: var(--gold);
  margin: 0 0 6px;
  text-shadow: 0 0 30px var(--gold-glow);
}
.subtitle {
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
  margin: 0 0 1.5rem;
  font-style: italic;
  letter-spacing: 0.05em;
}
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: 1.25rem 0;
  opacity: 0.6;
}
.section-label {
  font-family: 'Cinzel', Georgia, serif;
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin: 0 0 12px;
  text-align: center;
}
.lifetime {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  font-size: 12px;
  color: var(--text-muted);
  margin: 0 0 1.5rem;
  flex-wrap: wrap;
}
.lifetime span b { color: var(--gold); font-weight: 500; }

.subjects {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 1rem;
}
.subject-tile {
  display: block;
  text-decoration: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 14px;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  text-align: left;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}
.subject-tile:hover, .subject-tile:active {
  transform: translateY(-2px);
  border-color: var(--accent, var(--border-bright));
  box-shadow: 0 0 20px var(--accent-glow, transparent);
}
.subject-tile.locked {
  opacity: 0.45;
  cursor: not-allowed;
}
.subject-tile.locked:hover, .subject-tile.locked:active {
  transform: none;
  box-shadow: none;
}
.subject-name {
  font-family: 'Cinzel', Georgia, serif;
  font-size: 14px;
  letter-spacing: 0.05em;
  color: var(--accent, var(--text));
  display: block;
  margin-bottom: 4px;
}
.subject-meta {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.03em;
}
.subject-meta b { color: var(--accent, var(--gold)); font-weight: 500; }
.subject-status {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 6px;
  display: block;
}

.tile-biology { --accent: #d4af37; --accent-glow: rgba(212, 175, 55, 0.2); }
.tile-physics { --accent: #4a9eff; --accent-glow: rgba(74, 158, 255, 0.2); }
.tile-history { --accent: #c4622a; --accent-glow: rgba(196, 98, 42, 0.2); }
.tile-psychology { --accent: #b08fd1; --accent-glow: rgba(176, 143, 209, 0.2); }
.tile-business { --accent: #4ade80; --accent-glow: rgba(74, 222, 128, 0.2); }
.tile-classics { --accent: #f0e2c4; --accent-glow: rgba(240, 226, 196, 0.15); }
.tile-german { --accent: #5a7d52; --accent-glow: rgba(90, 125, 82, 0.2); }
.tile-maths { --accent: #ec4899; --accent-glow: rgba(236, 72, 153, 0.2); }

.daily-mix-btn {
  display: block; width: 100%;
  padding: 16px;
  margin-top: 1rem;
  background: linear-gradient(180deg, #1a1310 0%, #0e0a07 100%);
  border: 1px solid var(--gold);
  border-radius: 8px;
  color: var(--gold);
  cursor: pointer;
  font-family: 'Cinzel', Georgia, serif;
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 700;
  box-shadow: 0 0 20px var(--gold-glow);
  text-align: center;
  text-decoration: none;
}
.daily-mix-btn.disabled {
  opacity: 0.5;
  cursor: not-allowed;
  box-shadow: none;
}
.daily-mix-btn:hover:not(.disabled), .daily-mix-btn:active:not(.disabled) {
  background: linear-gradient(180deg, #221810 0%, #14100a 100%);
  box-shadow: 0 0 30px var(--gold-glow);
}
.daily-mix-sub {
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  font-size: 11px;
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0.02em;
  color: var(--text-muted);
  display: block;
  margin-top: 4px;
}

.footer {
  text-align: center;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-family: 'Cinzel', Georgia, serif;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">Mock Mode</h1>
  <p class="subtitle">Pick your battle.</p>

  <div id="lifetime-stats"></div>

  <div class="divider"></div>
  <p class="section-label">Subjects</p>

  <div class="subjects" id="subjects"></div>

  <a href="#" class="daily-mix-btn" id="daily-mix">
    Daily Mix
    <span class="daily-mix-sub">Random questions across every unlocked subject</span>
  </a>

  <div class="footer">Tarnished, arise.</div>
</div>

<script>
const SUBJECTS = [
  { id: 'biology', name: 'Biology', file: 'biology.html', storageKey: 'biology-boss-battle-v1', tileClass: 'tile-biology', live: true },
  { id: 'physics', name: 'Physics', file: 'physics.html', storageKey: 'physics-mock-mode-v1', tileClass: 'tile-physics', live: true },
  { id: 'history', name: 'History', file: 'history.html', storageKey: 'history-mock-mode-v1', tileClass: 'tile-history', live: true },
  { id: 'psychology', name: 'Psychology', file: 'psychology.html', storageKey: 'psychology-mock-mode-v1', tileClass: 'tile-psychology', live: false },
  { id: 'business', name: 'Business', file: 'business.html', storageKey: 'business-mock-mode-v1', tileClass: 'tile-business', live: false },
  { id: 'classics', name: 'Classics', file: 'classics.html', storageKey: 'classics-mock-mode-v1', tileClass: 'tile-classics', live: false },
  { id: 'german', name: 'German', file: 'german.html', storageKey: 'german-mock-mode-v1', tileClass: 'tile-german', live: false },
  { id: 'maths', name: 'Maths', file: 'maths.html', storageKey: 'maths-mock-mode-v1', tileClass: 'tile-maths', live: false }
];

function loadSubjectStats(storageKey) {
  try { return JSON.parse(localStorage.getItem(storageKey)) || {}; }
  catch { return {}; }
}

function getSubjectSummary(subject) {
  const stats = loadSubjectStats(subject.storageKey);
  let plays = 0, correct = 0, total = 0;
  for (const id in stats) {
    const r = stats[id];
    plays += r.plays || 0;
    correct += r.totalCorrect || 0;
    total += r.totalQuestions || 0;
  }
  const accuracy = total ? Math.round((correct / total) * 100) : 0;
  return { plays, accuracy, hasPlayed: plays > 0 };
}

function getLifetimeTotals() {
  let plays = 0, correct = 0, total = 0;
  SUBJECTS.forEach(s => {
    const stats = loadSubjectStats(s.storageKey);
    for (const id in stats) {
      const r = stats[id];
      plays += r.plays || 0;
      correct += r.totalCorrect || 0;
      total += r.totalQuestions || 0;
    }
  });
  return { plays, accuracy: total ? Math.round((correct / total) * 100) : 0 };
}

function renderLifetime() {
  const life = getLifetimeTotals();
  const el = document.getElementById('lifetime-stats');
  if (life.plays > 0) {
    el.innerHTML = `<div class="lifetime"><span><b>${life.plays}</b> total runs</span><span><b>${life.accuracy}%</b> lifetime accuracy</span></div>`;
  } else {
    el.innerHTML = `<div class="lifetime"><span style="font-style:italic">Your story begins here.</span></div>`;
  }
}

function renderSubjects() {
  const grid = document.getElementById('subjects');
  grid.innerHTML = SUBJECTS.map(s => {
    if (!s.live) {
      return `<div class="subject-tile locked ${s.tileClass}">
        <span class="subject-name">${s.name}</span>
        <span class="subject-meta">Coming soon</span>
        <span class="subject-status">Locked</span>
      </div>`;
    }
    const summary = getSubjectSummary(s);
    const meta = summary.hasPlayed
      ? `<b>${summary.plays}</b> runs &middot; <b>${summary.accuracy}%</b>`
      : 'Not yet attempted';
    return `<a href="${s.file}" class="subject-tile ${s.tileClass}">
      <span class="subject-name">${s.name}</span>
      <span class="subject-meta">${meta}</span>
      <span class="subject-status">${summary.hasPlayed ? 'In progress' : 'Ready'}</span>
    </a>`;
  }).join('');
}

const dailyMixBtn = document.getElementById('daily-mix');
const liveCount = SUBJECTS.filter(s => s.live).length;
if (liveCount < 2) {
  dailyMixBtn.classList.add('disabled');
  dailyMixBtn.querySelector('.daily-mix-sub').textContent = 'Unlocks when 2+ subjects are ready';
}
dailyMixBtn.addEventListener('click', (e) => {
  e.preventDefault();
  if (liveCount < 2) return;
  alert('Daily Mix coming soon!');
});

renderLifetime();
renderSubjects();

window.addEventListener('pageshow', () => {
  renderLifetime();
  renderSubjects();
});
</script>
</body>
</html>
